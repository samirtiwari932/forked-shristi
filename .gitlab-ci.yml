stages:
  - build-docker
  - deploy
  - release

variables:
  DOCKER_HOST: tcp://docker:2375

build_docker:
  stage: build-docker
  image: docker:27
  services:
    - docker:27.5.1-dind
  before_script:
    - export VERSION_TAG=${CI_COMMIT_TAG#v}
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker build -t $CI_REGISTRY_IMAGE:$VERSION_TAG .
    - docker push $CI_REGISTRY_IMAGE:$VERSION_TAG
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - tags

deploy:
  stage: deploy
  image: alpine
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts
  script:
    - ssh $REMOTE_USER@$REMOTE_HOST "cd deployment/ && docker compose pull shristi-next && docker compose up shristi-next -d"
  dependencies:
    - build_docker
  only:
    - tags

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script:
    - export VERSION_TAG=${CI_COMMIT_TAG#v}
  script:
    - echo "running release_job"
  release:
    name: "$VERSION_TAG"
    tag_name: "$CI_COMMIT_TAG"
    description: "Automated release for tag:$CI_COMMIT_TAG"
  dependencies:
    - deploy
  only:
    - tags
